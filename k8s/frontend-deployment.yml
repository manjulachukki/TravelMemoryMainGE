apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: travelmemory
  labels:
    app: travelmemory
    tier: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: travelmemory
      tier: frontend
  template:
    metadata:
      labels:
        app: travelmemory
        tier: frontend
    spec:
      containers:
        - name: frontend
          image: 975050024946.dkr.ecr.ap-south-1.amazonaws.com/travelmemory-frontend:latest
          ports:
            - containerPort: 3000
          env:
            - name: REACT_APP_BACKEND_URL
              value: "http://backend-service:3001"
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 5
